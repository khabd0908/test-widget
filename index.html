<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperShip Chatbot Demo</title>
    <!-- Add Inter font for premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .demo-container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        h1 span {
            color: #EE2E24;
        }

        p {
            color: #666;
            line-height: 1.6;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin-bottom: 15px;
        }

        a {
            text-decoration: none;
            display: block;
            padding: 15px 20px;
            background: white;
            border-radius: 10px;
            color: #333;
            font-weight: bold;
            border-left: 5px solid #EE2E24;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        a:hover {
            background: #fdfdfd;
            transform: translateX(5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        .badge {
            float: right;
            font-size: 0.85rem;
            background: #EE2E24;
            padding: 4px 10px;
            border-radius: 20px;
            color: white;
            font-weight: 500;
        }
    </style>

</head>

<body>
    <div class="demo-container">
        <h1><span>SuperShip</span> AI Chatbot Demo</h1>
    </div>
</body>

</html>
